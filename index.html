<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internet Speed Test</title>
  <style>
    :root {
      --text: #f8fbff;
      --muted: #a9b9de;
      --download: #45a3ff;
      --upload: #a66bff;
      --ping: #34e1ff;
      --accent: #78a6ff;
      --ok: #81f0b4;
      --warn: #ffd97a;
      --danger: #ff8f8f;
      --bg-deep: #02040b;
      --bg-deeper: #050816;
      --panel-top: rgba(7, 10, 22, 0.98);
      --panel-bottom: rgba(3, 6, 14, 0.99);
      --glow-blue: rgba(69, 163, 255, 0.30);
      --glow-purple: rgba(166, 107, 255, 0.24);
      --glow-cyan: rgba(52, 225, 255, 0.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(69, 163, 255, 0.14), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(166, 107, 255, 0.14), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(52, 225, 255, 0.08), transparent 28%),
        linear-gradient(180deg, var(--bg-deeper) 0%, var(--bg-deep) 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .page {
      width: min(1120px, 100%);
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      border: 1px solid rgba(133, 161, 255, 0.10);
      border-radius: 28px;
      padding: 42px 42px 28px;
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.62),
        0 0 0 1px rgba(83, 115, 255, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(50px);
      pointer-events: none;
      opacity: 0.65;
    }

    .panel::before {
      width: 320px;
      height: 320px;
      background: var(--glow-blue);
      top: -110px;
      right: -90px;
    }

    .panel::after {
      width: 260px;
      height: 260px;
      background: var(--glow-purple);
      bottom: -120px;
      left: -70px;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: clamp(2rem, 4vw, 3.3rem);
      letter-spacing: 0.01em;
      font-weight: 800;
      background: linear-gradient(90deg, #f8fbff 0%, #7dc5ff 40%, #b58cff 72%, #7af2ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 26px rgba(103, 162, 255, 0.18);
    }

    .divider {
      position: relative;
      z-index: 1;
      height: 10px;
      width: min(92%, 860px);
      margin: 22px auto 38px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(125,197,255,0.22), rgba(166,107,255,0.36), rgba(52,225,255,0.34), rgba(125,197,255,0.18), transparent);
      box-shadow: 0 0 34px rgba(82, 140, 255, 0.20);
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 34px;
      align-items: center;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .metric {
      background: linear-gradient(180deg, rgba(13, 18, 34, 0.92), rgba(7, 10, 20, 0.96));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      padding: 24px 22px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 12px 30px rgba(0,0,0,0.28);
      min-height: 154px;
    }

    .metric.download {
      border-color: rgba(69, 163, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 12px 30px rgba(0,0,0,0.28),
        0 0 28px rgba(69, 163, 255, 0.08);
    }

    .metric.upload {
      border-color: rgba(166, 107, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 12px 30px rgba(0,0,0,0.28),
        0 0 28px rgba(166, 107, 255, 0.08);
    }

    .metric.ping {
      border-color: rgba(52, 225, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 12px 30px rgba(0,0,0,0.28),
        0 0 28px rgba(52, 225, 255, 0.08);
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid currentColor;
      font-size: 10px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .download .label { color: var(--download); text-shadow: 0 0 16px rgba(69, 163, 255, 0.22); }
    .upload .label { color: var(--upload); text-shadow: 0 0 16px rgba(166, 107, 255, 0.22); }
    .ping .label { color: var(--ping); text-shadow: 0 0 16px rgba(52, 225, 255, 0.22); }

    .value {
      margin-top: 12px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .number {
      font-size: clamp(2.8rem, 5vw, 4.1rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.95;
      min-width: 120px;
      color: #f8fbff;
      text-shadow: 0 0 22px rgba(255,255,255,0.08);
    }

    .download .number {
      color: #8fcdff;
      text-shadow: 0 0 24px rgba(69, 163, 255, 0.34);
    }

    .upload .number {
      color: #caa8ff;
      text-shadow: 0 0 24px rgba(166, 107, 255, 0.34);
    }

    .ping .number {
      color: #93f2ff;
      text-shadow: 0 0 24px rgba(52, 225, 255, 0.34);
    }

    .unit {
      font-size: 1.2rem;
      color: #bfd0f2;
      padding-bottom: 8px;
      text-shadow: 0 0 14px rgba(255,255,255,0.04);
    }

    .action-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .again-btn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 3px solid rgba(120, 166, 255, 0.9);
      background:
        radial-gradient(circle at 30% 30%, rgba(69,163,255,0.28), rgba(166,107,255,0.10) 48%, rgba(47,140,255,0.05) 70%),
        rgba(8, 12, 24, 0.9);
      color: #9bc0ff;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow:
        0 0 0 10px rgba(47, 140, 255, 0.06),
        0 18px 50px rgba(26, 67, 187, 0.28),
        0 0 28px rgba(120, 166, 255, 0.18),
        inset 0 0 24px rgba(255,255,255,0.06);
      transition: transform 0.22s ease, box-shadow 0.22s ease, color 0.22s ease, opacity 0.22s ease;
    }

    .again-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.02);
      box-shadow:
        0 0 0 14px rgba(47, 140, 255, 0.06),
        0 20px 60px rgba(26, 67, 187, 0.28),
        0 0 30px rgba(47, 140, 255, 0.26);
      color: #d0deff;
    }

    .again-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .again-btn:disabled {
      cursor: wait;
      opacity: 0.9;
    }

    .again-btn.testing {
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow:
          0 0 0 10px rgba(47, 140, 255, 0.05),
          0 18px 50px rgba(26, 67, 187, 0.22),
          0 0 18px rgba(47, 140, 255, 0.18);
      }
      50% {
        box-shadow:
          0 0 0 16px rgba(47, 140, 255, 0.09),
          0 18px 50px rgba(26, 67, 187, 0.22),
          0 0 40px rgba(47, 140, 255, 0.30);
      }
    }

    .details {
      margin-top: 26px;
      display: grid;
      gap: 12px;
      color: #e3edff;
      font-size: 1.05rem;
    }

    .detail {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #dde8ff;
      line-height: 1.5;
      text-shadow: 0 0 16px rgba(109, 138, 255, 0.10);
    }

    .detail .bullet {
      width: 18px;
      text-align: center;
      color: #8bd2ff;
      filter: drop-shadow(0 0 12px rgba(47,140,255,0.40));
      flex: 0 0 18px;
      margin-top: 1px;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(10,14,28,0.82);
      border: 1px solid rgba(128,150,255,0.10);
      color: #d6e6ff;
      line-height: 1.55;
    }

    .status:empty {
      display: none;
    }

    .status.running { color: var(--warn); }
    .status.success { color: var(--ok); }
    .status.error { color: var(--danger); }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 26px;
      text-align: center;
      color: rgba(208, 222, 255, 0.82);
      text-shadow: 0 0 12px rgba(102, 160, 255, 0.10);
      font-size: 0.98rem;
      letter-spacing: 0.02em;
    }

    @media (max-width: 920px) {
      .content {
        grid-template-columns: 1fr;
      }

      .action-wrap {
        order: -1;
        padding-bottom: 4px;
      }

      .again-btn {
        width: 190px;
        height: 190px;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .panel {
        padding: 26px 18px 22px;
        border-radius: 22px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .metric {
        padding: 20px 18px;
        min-height: auto;
      }

      .details {
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Internet Speed Test</h1>
      <div class="divider"></div>

      <div class="content">
        <div>
          <div class="metrics">
            <article class="metric download">
              <div class="label"><span class="icon">↓</span> Download</div>
              <div class="value">
                <div class="number" id="downloadValue">--</div>
                <div class="unit">Mbps</div>
              </div>
            </article>

            <article class="metric upload">
              <div class="label"><span class="icon">↑</span> Upload</div>
              <div class="value">
                <div class="number" id="uploadValue">--</div>
                <div class="unit">Mbps</div>
              </div>
            </article>

            <article class="metric ping">
              <div class="label"><span style="font-size:1rem; transform: translateY(-1px);">⇄</span> Ping</div>
              <div class="value">
                <div class="number" id="pingValue">--</div>
                <div class="unit">ms</div>
              </div>
            </article>
          </div>

          <div class="details">
            <div class="detail"><span class="bullet">🌐</span> <span id="serverInfo">Server: Detecting live server…</span></div>
            <div class="detail"><span class="bullet">◎</span> <span id="clientInfo">Client: Detecting current public IP and network…</span></div>
          </div>

          <div class="status" id="statusBox"></div>
        </div>

        <div class="action-wrap">
          <button class="again-btn" id="againBtn" aria-label="Run speed test again">START</button>
        </div>
      </div>

      <footer>© Bappa Ghosh. All rights reserved.</footer>
    </section>
  </main>

  <script type="module">
    const downloadEl = document.getElementById('downloadValue');
    const uploadEl = document.getElementById('uploadValue');
    const pingEl = document.getElementById('pingValue');
    const serverInfoEl = document.getElementById('serverInfo');
    const clientInfoEl = document.getElementById('clientInfo');
    const statusBox = document.getElementById('statusBox');
    const againBtn = document.getElementById('againBtn');

    let SpeedTestClass = null;
    let activeTest = null;
    let progressTimer = null;

    function setStatus(message = '', state = '') {
      statusBox.textContent = message;
      statusBox.className = state ? `status ${state}` : 'status';
    }

    function setValue(el, value, digits = 2) {
      if (typeof value !== 'number' || !Number.isFinite(value)) {
        el.textContent = '--';
        return;
      }
      el.textContent = digits === 0 ? String(Math.round(value)) : value.toFixed(digits);
    }

    function safeCall(results, methodName) {
      try {
        const method = results?.[methodName];
        if (typeof method === 'function') return method.call(results);
      } catch (_) {
        return undefined;
      }
      return undefined;
    }

    function parseTrace(text) {
      const data = {};
      String(text || '')
        .trim()
        .split('\n')
        .forEach((line) => {
          const index = line.indexOf('=');
          if (index > -1) data[line.slice(0, index)] = line.slice(index + 1);
        });
      return data;
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Request failed: ${response.status}`);
      return response.json();
    }

    async function fetchText(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Request failed: ${response.status}`);
      return response.text();
    }

    function updateMetrics(results) {
      const downBps = safeCall(results, 'getDownloadBandwidth');
      const upBps = safeCall(results, 'getUploadBandwidth');
      const pingMs = safeCall(results, 'getUnloadedLatency');

      if (Number.isFinite(downBps)) setValue(downloadEl, downBps / 1e6, 2);
      if (Number.isFinite(upBps)) setValue(uploadEl, upBps / 1e6, 2);
      if (Number.isFinite(pingMs)) setValue(pingEl, pingMs, 0);
    }

    async function refreshMeta() {
      let trace = null;
      let radar = null;
      let ipwho = null;

      try {
        const traceText = await fetchText('https://www.cloudflare.com/cdn-cgi/trace?ts=' + Date.now());
        trace = parseTrace(traceText);
      } catch (_) {}

      try {
        radar = await fetchJson('https://ipv4-check-perf.radar.cloudflare.com/api/info?ts=' + Date.now());
      } catch (_) {}

      if (!radar) {
        try {
          ipwho = await fetchJson('https://ipwho.is/?ts=' + Date.now());
        } catch (_) {}
      }

      const serverColo = trace?.colo || radar?.colo || 'Unknown';
      const serverHost = trace?.h || 'Cloudflare Edge';
      serverInfoEl.textContent = `Server: ${serverHost} · ${serverColo}`;

      const clientIp = radar?.ip_address || trace?.ip || ipwho?.ip || 'Unknown IP';
      const clientCity = radar?.city || ipwho?.city || '';
      const clientRegion = radar?.region || ipwho?.region || '';
      const clientCountry = radar?.country || ipwho?.country_code || ipwho?.country || '';
      const clientAsn = radar?.asn ? `ASN ${radar.asn}` : (ipwho?.connection?.asn ? `ASN ${ipwho.connection.asn}` : '');
      const clientOrg = ipwho?.connection?.org || ipwho?.connection?.isp || '';

      const locationParts = [clientCity, clientRegion, clientCountry].filter(Boolean);
      const extraParts = [clientIp, clientAsn, clientOrg].filter(Boolean);

      clientInfoEl.textContent = `Client: ${[locationParts.join(', '), extraParts.join(' · ')].filter(Boolean).join(' · ') || 'Unknown network details'}`;

      if (!trace && !radar && !ipwho) {
        serverInfoEl.textContent = 'Server: Network details unavailable in this preview.';
        clientInfoEl.textContent = 'Client: Network details unavailable in this preview.';
      }
    }

    function clearProgressTimer() {
      if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }

    function stopUi(buttonText = 'AGAIN') {
      clearProgressTimer();
      againBtn.disabled = false;
      againBtn.classList.remove('testing');
      againBtn.textContent = buttonText;
      activeTest = null;
    }

    function resetDisplayForNewRun() {
      downloadEl.textContent = '--';
      uploadEl.textContent = '--';
      pingEl.textContent = '--';
    }

    async function runTest() {
      if (activeTest) return;

      if (!SpeedTestClass) {
        setStatus('Live engine could not load here. Open this file in a normal browser with internet access and try again.', 'error');
        return;
      }

      resetDisplayForNewRun();
      await refreshMeta();

      againBtn.disabled = true;
      againBtn.classList.add('testing');
      againBtn.textContent = 'TESTING';
      setStatus('');

      try {
        activeTest = new SpeedTestClass({
          autoStart: false,
          measurements: [
            { type: 'latency', numPackets: 20 },
            { type: 'download', bytes: 1e5, count: 6, bypassMinDuration: true },
            { type: 'download', bytes: 1e6, count: 8 },
            { type: 'upload', bytes: 1e5, count: 6 },
            { type: 'upload', bytes: 1e6, count: 6 },
            { type: 'download', bytes: 1e7, count: 5 },
            { type: 'upload', bytes: 1e7, count: 4 },
            { type: 'download', bytes: 2.5e7, count: 3 }
          ]
        });

        progressTimer = setInterval(() => {
          if (activeTest?.results) updateMetrics(activeTest.results);
        }, 250);

        const finishHandler = async (results) => {
          updateMetrics(results || activeTest?.results);
          await refreshMeta();
          setStatus('Live test completed.', 'success');
          stopUi('AGAIN');
        };

        const errorHandler = (error) => {
          setStatus('Live test failed: ' + error, 'error');
          stopUi('RETRY');
        };

        activeTest.onFinish = finishHandler;
        activeTest.onFinished = finishHandler;
        activeTest.onError = errorHandler;
        activeTest.onConnectionError = errorHandler;

        activeTest.play();
      } catch (error) {
        setStatus('Could not start live speed test: ' + error.message, 'error');
        stopUi('RETRY');
      }
    }

    againBtn.addEventListener('click', runTest);

    (async () => {
      await refreshMeta();

      try {
        const module = await import('https://cdn.jsdelivr.net/npm/@cloudflare/speedtest/+esm');
        SpeedTestClass = module.default;
        setStatus('');
      } catch (error) {
        setStatus('Live engine could not load in this preview. Download or open this file in a normal browser with internet access.', 'error');
      }
    })();
  </script>
</body>
</html>
