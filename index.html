<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internet Speed Test</title>
  <style>
    :root {
      --text: #f4f7ff;
      --muted: #a3b0d0;
      --ping: #32ddff;
      --download: #4cff9f;
      --upload: #bf7cff;
      --action: #66b8ff;
      --ok: #81f0b4;
      --danger: #ff8f8f;
      --bg-deep: #000106;
      --bg-deeper: #02030a;
      --panel-top: rgba(3, 5, 16, 0.995);
      --panel-bottom: rgba(1, 2, 8, 0.998);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(76, 255, 159, 0.08), transparent 22%),
        radial-gradient(circle at 88% 14%, rgba(102, 184, 255, 0.10), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(50, 221, 255, 0.07), transparent 28%),
        radial-gradient(circle at 50% 0%, rgba(191, 124, 255, 0.06), transparent 20%),
        linear-gradient(180deg, var(--bg-deeper) 0%, var(--bg-deep) 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .page {
      width: min(1320px, 100%);
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      border: 1px solid rgba(88, 104, 170, 0.10);
      border-radius: 32px;
      padding: 46px 42px 30px;
      box-shadow:
        0 36px 120px rgba(0, 0, 0, 0.82),
        0 0 0 1px rgba(58, 72, 126, 0.05),
        0 0 50px rgba(18, 26, 64, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(60px);
      pointer-events: none;
      opacity: 0.58;
    }

    .panel::before {
      width: 340px;
      height: 340px;
      background: rgba(76, 255, 159, 0.10);
      top: -130px;
      left: -40px;
    }

    .panel::after {
      width: 320px;
      height: 320px;
      background: rgba(102, 184, 255, 0.12);
      right: -70px;
      bottom: -140px;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: clamp(2.1rem, 4vw, 3.4rem);
      letter-spacing: 0.01em;
      font-weight: 800;
      color: #ff9b3d;
      text-shadow: 0 0 18px rgba(255, 155, 61, 0.28);
    }

    .divider {
      position: relative;
      z-index: 1;
      height: 10px;
      width: min(95%, 1080px);
      margin: 22px auto 38px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(76, 255, 159, 0.16),
        rgba(102, 184, 255, 0.18),
        rgba(191, 124, 255, 0.18),
        rgba(50, 221, 255, 0.16),
        transparent
      );
      box-shadow: 0 0 24px rgba(71, 122, 255, 0.14);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
      align-items: stretch;
    }

    .metric {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 240px;
      padding: 30px 28px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(7, 10, 22, 0.96), rgba(2, 4, 12, 0.99));
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 16px 36px rgba(0,0,0,0.40);
    }

    .metric.ping {
      border-color: rgba(50, 221, 255, 0.26);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 16px 36px rgba(0,0,0,0.40),
        0 0 28px rgba(50, 221, 255, 0.07);
    }

    .metric.download {
      border-color: rgba(76, 255, 159, 0.26);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 16px 36px rgba(0,0,0,0.40),
        0 0 28px rgba(76, 255, 159, 0.08);
    }

    .metric.upload {
      border-color: rgba(191, 124, 255, 0.26);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 16px 36px rgba(0,0,0,0.40),
        0 0 28px rgba(191, 124, 255, 0.08);
    }

    .metric.action-card {
      padding: 0;
      overflow: hidden;
      border-color: rgba(102, 184, 255, 0.28);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 16px 36px rgba(0,0,0,0.40),
        0 0 28px rgba(102, 184, 255, 0.09);
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.12rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid currentColor;
      font-size: 10px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .ping .label {
      color: var(--ping);
      text-shadow: 0 0 12px rgba(50, 221, 255, 0.20);
    }

    .download .label {
      color: var(--download);
      text-shadow: 0 0 12px rgba(76, 255, 159, 0.20);
    }

    .upload .label {
      color: var(--upload);
      text-shadow: 0 0 12px rgba(191, 124, 255, 0.20);
    }

    .value {
      margin-top: 18px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .number {
      font-size: clamp(2rem, 3.3vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.95;
      min-width: 96px;
      color: #eef4ff;
      text-shadow: 0 0 12px rgba(255,255,255,0.05);
    }

    .ping .number {
      color: #7cf1ff;
      text-shadow: 0 0 16px rgba(50, 221, 255, 0.30);
    }

    .download .number {
      color: #7dffb6;
      text-shadow: 0 0 16px rgba(76, 255, 159, 0.30);
    }

    .upload .number {
      color: #d7aeff;
      text-shadow: 0 0 16px rgba(191, 124, 255, 0.30);
    }

    .unit {
      font-size: 1.08rem;
      color: #c8d6f5;
      padding-bottom: 6px;
    }

    .again-btn {
      width: 100%;
      height: 100%;
      min-height: 240px;
      border: 0;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(8, 18, 36, 0.98), rgba(4, 8, 20, 0.995));
      color: var(--action);
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        inset 0 0 28px rgba(102, 184, 255, 0.06);
      transition: transform 0.22s ease, box-shadow 0.22s ease, color 0.22s ease, opacity 0.22s ease;
      text-shadow: 0 0 14px rgba(102, 184, 255, 0.26);
    }

    .again-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        inset 0 0 28px rgba(102, 184, 255, 0.08),
        0 0 24px rgba(102, 184, 255, 0.12);
      color: #9fd4ff;
    }

    .again-btn:active:not(:disabled) {
      transform: scale(0.985);
    }

    .again-btn:disabled {
      cursor: wait;
      opacity: 0.95;
    }

    .again-btn.testing {
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.03),
          inset 0 0 24px rgba(102, 184, 255, 0.06),
          0 0 16px rgba(102, 184, 255, 0.08);
      }
      50% {
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.03),
          inset 0 0 28px rgba(102, 184, 255, 0.09),
          0 0 26px rgba(102, 184, 255, 0.16);
      }
    }

    .details {
      margin-top: 28px;
      display: grid;
      gap: 12px;
      color: #d9e4ff;
      font-size: 1rem;
    }

    .detail {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #d9e4ff;
      line-height: 1.55;
      text-shadow: 0 0 10px rgba(70, 92, 160, 0.08);
    }

    .detail .bullet {
      width: 18px;
      text-align: center;
      color: #95d9ff;
      filter: drop-shadow(0 0 12px rgba(47,140,255,0.32));
      flex: 0 0 18px;
      margin-top: 1px;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(6, 8, 18, 0.90);
      border: 1px solid rgba(82, 102, 180, 0.10);
      color: #d6e6ff;
      line-height: 1.55;
    }

    .status:empty {
      display: none;
    }

    .status.error {
      color: var(--danger);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 26px;
      text-align: center;
      color: rgba(176, 191, 226, 0.74);
      text-shadow: 0 0 10px rgba(70, 92, 160, 0.07);
      font-size: 0.98rem;
      letter-spacing: 0.02em;
    }

    @media (max-width: 1180px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .panel {
        padding: 26px 18px 22px;
        border-radius: 22px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .metric,
      .again-btn {
        min-height: 180px;
      }

      .metric {
        padding: 22px 20px;
      }

      .details {
        font-size: 0.96rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Internet Speed Test</h1>
      <div class="divider"></div>

      <div class="content">
        <div>
          <div class="metrics">
            <article class="metric ping">
              <div class="label"><span style="font-size:1rem; transform: translateY(-1px);">⇄</span> Ping</div>
              <div class="value">
                <div class="number" id="pingValue">--</div>
                <div class="unit">ms</div>
              </div>
            </article>

            <article class="metric download">
              <div class="label"><span class="icon">↓</span> Download</div>
              <div class="value">
                <div class="number" id="downloadValue">--</div>
                <div class="unit">Mbps</div>
              </div>
            </article>

            <article class="metric upload">
              <div class="label"><span class="icon">↑</span> Upload</div>
              <div class="value">
                <div class="number" id="uploadValue">--</div>
                <div class="unit">Mbps</div>
              </div>
            </article>

            <article class="metric action-card">
              <button class="again-btn" id="againBtn" aria-label="Run speed test again">START</button>
            </article>
          </div>

          <div class="details">
            <div class="detail"><span class="bullet">🌐</span> <span id="serverInfo">Server: Detecting live server…</span></div>
            <div class="detail"><span class="bullet">◎</span> <span id="clientInfo">Client: Detecting current public IP and network…</span></div>
          </div>

          <div class="status" id="statusBox"></div>
        </div>
      </div>

      <footer>© Bappa Ghosh. All rights reserved.</footer>
    </section>
  </main>

  <script type="module">
    const downloadEl = document.getElementById('downloadValue');
    const uploadEl = document.getElementById('uploadValue');
    const pingEl = document.getElementById('pingValue');
    const serverInfoEl = document.getElementById('serverInfo');
    const clientInfoEl = document.getElementById('clientInfo');
    const statusBox = document.getElementById('statusBox');
    const againBtn = document.getElementById('againBtn');

    let SpeedTestClass = null;
    let activeTest = null;
    let progressTimer = null;

    function setStatus(message = '', state = '') {
      statusBox.textContent = message;
      statusBox.className = state ? `status ${state}` : 'status';
    }

    function setValue(el, value, digits = 2) {
      if (typeof value !== 'number' || !Number.isFinite(value)) {
        el.textContent = '--';
        return;
      }
      el.textContent = digits === 0 ? String(Math.round(value)) : value.toFixed(digits);
    }

    function safeCall(results, methodName) {
      try {
        const method = results?.[methodName];
        if (typeof method === 'function') return method.call(results);
      } catch (_) {
        return undefined;
      }
      return undefined;
    }

    function parseTrace(text) {
      const data = {};
      String(text || '')
        .trim()
        .split('\n')
        .forEach((line) => {
          const index = line.indexOf('=');
          if (index > -1) data[line.slice(0, index)] = line.slice(index + 1);
        });
      return data;
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Request failed: ${response.status}`);
      return response.json();
    }

    async function fetchText(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Request failed: ${response.status}`);
      return response.text();
    }

    function updateMetrics(results) {
      const downBps = safeCall(results, 'getDownloadBandwidth');
      const upBps = safeCall(results, 'getUploadBandwidth');
      const pingMs = safeCall(results, 'getUnloadedLatency');

      if (Number.isFinite(downBps)) setValue(downloadEl, downBps / 1e6, 2);
      if (Number.isFinite(upBps)) setValue(uploadEl, upBps / 1e6, 2);
      if (Number.isFinite(pingMs)) setValue(pingEl, pingMs, 0);
    }

    async function refreshMeta() {
      let trace = null;
      let radar = null;
      let ipwho = null;

      try {
        const traceText = await fetchText('https://www.cloudflare.com/cdn-cgi/trace?ts=' + Date.now());
        trace = parseTrace(traceText);
      } catch (_) {}

      try {
        radar = await fetchJson('https://ipv4-check-perf.radar.cloudflare.com/api/info?ts=' + Date.now());
      } catch (_) {}

      if (!radar) {
        try {
          ipwho = await fetchJson('https://ipwho.is/?ts=' + Date.now());
        } catch (_) {}
      }

      const serverColo = trace?.colo || radar?.colo || 'Unknown';
      const serverHost = trace?.h || 'Cloudflare Edge';
      serverInfoEl.textContent = `Server: ${serverHost} · ${serverColo}`;

      const clientIp = radar?.ip_address || trace?.ip || ipwho?.ip || 'Unknown IP';
      const clientCity = radar?.city || ipwho?.city || '';
      const clientRegion = radar?.region || ipwho?.region || '';
      const clientCountry = radar?.country || ipwho?.country_code || ipwho?.country || '';
      const clientAsn = radar?.asn ? `ASN ${radar.asn}` : (ipwho?.connection?.asn ? `ASN ${ipwho.connection.asn}` : '');
      const clientOrg = ipwho?.connection?.org || ipwho?.connection?.isp || '';

      const locationParts = [clientCity, clientRegion, clientCountry].filter(Boolean);
      const extraParts = [clientIp, clientAsn, clientOrg].filter(Boolean);

      clientInfoEl.textContent = `Client: ${[locationParts.join(', '), extraParts.join(' · ')].filter(Boolean).join(' · ') || 'Unknown network details'}`;

      if (!trace && !radar && !ipwho) {
        serverInfoEl.textContent = 'Server: Network details unavailable in this preview.';
        clientInfoEl.textContent = 'Client: Network details unavailable in this preview.';
      }
    }

    function clearProgressTimer() {
      if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }

    function stopUi(buttonText = 'AGAIN') {
      clearProgressTimer();
      againBtn.disabled = false;
      againBtn.classList.remove('testing');
      againBtn.textContent = buttonText;
      activeTest = null;
    }

    function resetDisplayForNewRun() {
      downloadEl.textContent = '--';
      uploadEl.textContent = '--';
      pingEl.textContent = '--';
    }

    async function runTest() {
      if (activeTest) return;

      if (!SpeedTestClass) {
        setStatus('Live engine could not load here. Open this file in a normal browser with internet access and try again.', 'error');
        return;
      }

      resetDisplayForNewRun();
      await refreshMeta();

      againBtn.disabled = true;
      againBtn.classList.add('testing');
      againBtn.textContent = 'TESTING';
      setStatus('');

      try {
        activeTest = new SpeedTestClass({
          autoStart: false,
          measurements: [
            { type: 'latency', numPackets: 20 },
            { type: 'download', bytes: 1e5, count: 6, bypassMinDuration: true },
            { type: 'download', bytes: 1e6, count: 8 },
            { type: 'upload', bytes: 1e5, count: 6 },
            { type: 'upload', bytes: 1e6, count: 6 },
            { type: 'download', bytes: 1e7, count: 5 },
            { type: 'upload', bytes: 1e7, count: 4 },
            { type: 'download', bytes: 2.5e7, count: 3 }
          ]
        });

        progressTimer = setInterval(() => {
          if (activeTest?.results) updateMetrics(activeTest.results);
        }, 250);

        const finishHandler = async (results) => {
          updateMetrics(results || activeTest?.results);
          await refreshMeta();
          setStatus('');
          stopUi('AGAIN');
        };

        const errorHandler = (error) => {
          setStatus('Live test failed: ' + error, 'error');
          stopUi('RETRY');
        };

        activeTest.onFinish = finishHandler;
        activeTest.onFinished = finishHandler;
        activeTest.onError = errorHandler;
        activeTest.onConnectionError = errorHandler;

        activeTest.play();
      } catch (error) {
        setStatus('Could not start live speed test: ' + error.message, 'error');
        stopUi('RETRY');
      }
    }

    againBtn.addEventListener('click', runTest);

    (async () => {
      await refreshMeta();

      try {
        const module = await import('https://cdn.jsdelivr.net/npm/@cloudflare/speedtest/+esm');
        SpeedTestClass = module.default;
        setStatus('');
      } catch (error) {
        setStatus('Live engine could not load in this preview. Download or open this file in a normal browser with internet access.', 'error');
      }
    })();
  </script>
</body>
</html>
